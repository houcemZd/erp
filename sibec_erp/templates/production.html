{% extends "base.html" %}
{% block title %}Production - SIBEC ERP{% endblock %}
{% block content %}
<h1>Suivi Production</h1>
<form method="POST" class="card">
  <label for="production-ref">Référence</label>
  <input id="production-ref" type="text" name="ref" placeholder="Référence" required maxlength="50">
  <label for="production-qty">Quantité produite</label>
  <input id="production-qty" type="number" name="qty" min="1" placeholder="Quantité produite" required>
  <button type="submit">Enregistrer</button>
</form>
{% endblock %}
