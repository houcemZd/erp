{% extends "base.html" %}
{% block title %}Stock - SIBEC ERP{% endblock %}
{% block content %}
<h1>Stock</h1>
<table>
  <tr>
    <th>Référence</th>
    <th>Quantité</th>
  </tr>
  {% for item in data %}
  <tr>
    <td>{{ item.ref }}</td>
    <td>{{ item.qty }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
