{% extends "base.html" %}
{% block title %}Entrée / Sortie - SIBEC ERP{% endblock %}
{% block content %}
<h1>Entrée / Sortie</h1>
<form method="POST" class="card">
  <input type="text" name="ref" placeholder="Référence" required maxlength="50">
  <input type="number" name="qty" min="1" placeholder="Quantité" required>
  <select name="type">
    <option value="ENTREE">ENTREE</option>
    <option value="SORTIE">SORTIE</option>
  </select>
  <button type="submit">Valider</button>
</form>
{% endblock %}
